<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Golf Tools</title>

<style>
:root{
  font-family: system-ui;
  --bg:#0b0f14;
  --panel:#0f1620;
  --text:#e8eef6;
  --muted:#9bb0c7;
  --primary:#1c6ff2;
}
body{margin:0;background:var(--bg);color:var(--text);}
button{font-size:16px;}

.fade {
  animation: fadeIn 600ms ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px);}
  to { opacity:1; transform:translateY(0);}
}

.popover{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.popover.show{display:flex;}
.modal{
  background:var(--panel);
  padding:16px;
  border-radius:12px;
  width:90%;
  max-width:340px;
}
.sliderRow{
  margin:12px 0;
}
</style>
</head>

<body>

<div style="padding:10px">
  <div id="display">Enter yards</div>
  <div id="haiku"></div>
  <button onclick="openConditions()">☀️</button>
</div>

<div class="popover" id="conditions">
  <div class="modal">
    <button onclick="closeConditions()">X</button>

    <div class="sliderRow">
      Wind: <input type="range" min="-4" max="4" value="0" id="wind">
    </div>
    <div class="sliderRow">
      Hole: <input type="range" min="-4" max="4" value="0" id="hole">
    </div>
    <div class="sliderRow">
      Green: <input type="range" min="-4" max="4" value="0" id="green">
    </div>

    <button onclick="saveConditions()">Save</button>
  </div>
</div>

<script>
let input="";
let shots=[];

let wind=0;
let hole=0;
let green=0;

function haiku(){
  return [
    "Cue Address Roll Ease",
    "Eye 1 2 3 4 1 2",
    "Step Hum Exhale Doubt"
  ];
}

function calc(y){
  if(y<=10){
    // putts
    let adjusted=y;

    if(green>0){
      adjusted += green * 4;
    } else if(green<0){
      for(let i=0;i<Math.abs(green);i++){
        adjusted *= .5;
      }
    }

    return adjusted;
  }

  if(y<=40){
    return y + (hole*5) + (green*5);
  }

  return y + (wind*10) + (hole*5) + (green*5);
}

function render(){
  document.getElementById("display").innerText=input || "Enter yards";

  const h=document.getElementById("haiku");
  h.innerHTML="";
  haiku().forEach((l,i)=>{
    const d=document.createElement("div");
    d.innerText=l;
    if(i===2 && lastShotEntered){
      d.classList.add("fade");
    }
    h.appendChild(d);
  });
}

let lastShotEntered=false;

function commit(){
  const y=Number(input);
  if(!y) return;

  const play=calc(y);

  shots.push({y,play});

  lastShotEntered=true;
  render();

  setTimeout(()=>lastShotEntered=false,800);

  input="";
}

function openConditions(){
  document.getElementById("conditions").classList.add("show");
}
function closeConditions(){
  document.getElementById("conditions").classList.remove("show");
}
function saveConditions(){
  wind=Number(document.getElementById("wind").value);
  hole=Number(document.getElementById("hole").value);
  green=Number(document.getElementById("green").value);
  closeConditions();
}
</script>

</body>
</html>
