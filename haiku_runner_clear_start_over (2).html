<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haiku Runner</title>
<style>
:root{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  --bg:#0b0f14;
  --panel:#0f1620;
  --panel2:#0b111a;
  --border:#1a2430;
  --border2:#223142;
  --text:#e8eef6;
  --muted:#9bb0c7;
  --primary:#1c6ff2;
}
*{ box-sizing:border-box; }
body{ margin:0; background:var(--bg); color:var(--text); }

header{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;
  top:0;
  z-index:30;
}
header h1{ margin:0; font-size:18px; }

.keypadBar{
  position:fixed;
  top:56px;
  left:0; right:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  z-index:20;
}
.keypadInner{
  max-width:400px;
  margin:auto;
  padding:10px;
}

.topRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.display{
  text-align:center;
  font-size:20px;
  font-weight:800;
}

.keypadRow{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:8px;
}
button{
  padding:12px 0;
  border-radius:10px;
  border:1px solid var(--border2);
  background:#101823;
  color:white;
  cursor:pointer;
}
.primary{ background:var(--primary); border-color:var(--primary); }

.statusLine{
  margin-top:10px;
  padding-top:8px;
  border-top:1px solid var(--border);
  font-size:14px;
  color:var(--muted);
  text-align:center;
  line-height:1.3;
  min-height:20px;
}

.wrap{
  max-width:400px;
  margin:auto;
  padding:250px 12px 40px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  margin-top:12px;
}

.title{
  font-size:24px;
  text-align:center;
  font-weight:900;
}

.line{
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  background:var(--panel2);
  text-align:center;
}

.logItem{
  background:var(--panel2);
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.logTitle{
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:8px;
}

.logFooter{
  margin-top:12px;
  text-align:center;
}

.clearLink{
  color:var(--muted);
  text-decoration:underline;
  cursor:pointer;
  font-size:14px;
}
.clearLink:hover{
  color:var(--text);
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:10px 0;
}

@media (max-width:400px){
  .wrap{ padding-top:244px; }
}
</style>
</head>
<body>

<header><h1>Haiku Runner</h1></header>

<div class="keypadBar">
  <div class="keypadInner">
    <div class="topRow">
      <div id="holeShotPill">Hole 1 • Shot 1</div>
      <div>Auto-hole: +80</div>
    </div>

    <div class="display" id="display">Enter yards</div>

    <div class="keypadRow" id="pad">
      <button data-k="1">1</button>
      <button data-k="2">2</button>
      <button data-k="3">3</button>
      <button data-k="4">4</button>
      <button data-k="5">5</button>
      <button data-k="6">6</button>
      <button data-k="7">7</button>
      <button data-k="8">8</button>
      <button data-k="9">9</button>
      <button data-k="0">0</button>
      <button data-k="⌫">⌫</button>
      <button data-k="C">C</button>
      <button class="primary" id="ok">OK</button>
    </div>

    <div class="statusLine" id="statusText">Hole 1 • Shot 1 • Yards — • Club —</div>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="title" id="title">Attached —</div>
  </div>

  <div class="card" id="haiku"></div>

  <div class="card">
    <div class="logTitle" id="logTitle">SHOT LOG (0 shots)</div>
    <div id="log"><div class="empty">No shots logged yet.</div></div>
    <div class="logFooter">
      <a id="clearLink" class="clearLink">Clear and start over</a>
    </div>
  </div>
</div>

<script>
const clubs=[
  ["D",245],["3",230],["H",205],["4",175],["5",165],
  ["6",155],["7",145],["8",135],["9",120],
  ["P",105],["G",95],["S",75],["L",65]
];

function club(y){
  if(y<=10) return "putt";
  let best=clubs[0];
  let diff=Math.abs(y-best[1]);
  for(let c of clubs){
    let d=Math.abs(y-c[1]);
    if(d<diff){best=c; diff=d;}
  }
  return best[0];
}

function haiku(y){
  if(y<=10){
    return [
      "Center. Expand. Sync.",
      "Extend. Tilt. Unlock. Picture.",
      "Still. 1 To, 1, 2."
    ];
  }
  if(y<100){
    return [
      "Center. Expand. Sync.",
      "Extend. Tilt. Unlock. Picture.",
      "Still. Sawish, Swish, Hold"
    ];
  }
  return [
    "Center. Expand. Stretch.",
    "Extend. Tilt. Unlock. Picture.",
    "Still. 1 2. 3. 4"
  ];
}

const DB="haikuDB";
let db;
let input="";
let last=null;
let shots=[];

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB,1);
    req.onupgradeneeded=e=>{
      if(!e.target.result.objectStoreNames.contains("logs")){
        e.target.result.createObjectStore("logs",{keyPath:"id"});
      }
    };
    req.onsuccess=()=>{ db=req.result; resolve(); };
    req.onerror=()=>reject(req.error);
  });
}

function dayKey(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  let id=localStorage.getItem("haikuDeviceId");
  if(!id){
    id=(crypto.randomUUID ? crypto.randomUUID() : "dev-"+Date.now()+"-"+Math.random().toString(16).slice(2));
    localStorage.setItem("haikuDeviceId", id);
  }
  return `${id}-${y}-${m}-${day}`;
}

function save(){
  if(!db) return;
  const record={ id: dayKey(), state:{ input, last, shots } };
  const tx=db.transaction("logs","readwrite");
  tx.objectStore("logs").put(record);
}

function load(){
  return new Promise((resolve,reject)=>{
    if(!db){ resolve(null); return; }
    const tx=db.transaction("logs","readonly");
    const req=tx.objectStore("logs").get(dayKey());
    req.onsuccess=()=>resolve(req.result || null);
    req.onerror=()=>reject(req.error);
  });
}

function deleteToday(){
  return new Promise((resolve,reject)=>{
    if(!db){ resolve(); return; }
    const tx=db.transaction("logs","readwrite");
    const req=tx.objectStore("logs").delete(dayKey());
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}

function nextPosition(y){
  if(!last) return {hole:1, shot:1};
  if(typeof y==="number" && Number.isFinite(y) && y > last.yards + 80){
    return {hole:last.hole + 1, shot:1};
  }
  return {hole:last.hole, shot:last.shot + 1};
}

function currentProjected(){
  const y=input ? Number(input) : null;
  if(Number.isFinite(y) && y>0) return nextPosition(y);
  if(last) return nextPosition();
  return {hole:1, shot:1};
}

function render(){
  const yPreview=input ? Number(input) : null;
  const hasPreview=Number.isFinite(yPreview) && yPreview>0;
  const projected=currentProjected();
  const previewClub=hasPreview ? club(yPreview) : "—";

  document.getElementById("display").innerText=input||"Enter yards";
  document.getElementById("holeShotPill").innerText=`Hole ${projected.hole} • Shot ${projected.shot}`;
  document.getElementById("statusText").innerText=`Hole ${projected.hole} • Shot ${projected.shot} • Yards ${hasPreview ? yPreview : "—"} • Club ${hasPreview ? previewClub : "—"}`;

  document.getElementById("title").innerText=last ? `Attached ${last.club}` : "Attached —";

  const yForHaiku=hasPreview ? yPreview : (last ? last.yards : 0);
  const h=document.getElementById("haiku");
  h.innerHTML="";
  haiku(yForHaiku).forEach(l=>{
    const d=document.createElement("div");
    d.className="line";
    d.innerText=l;
    h.appendChild(d);
  });

  document.getElementById("logTitle").innerText=`SHOT LOG (${shots.length} ${shots.length===1 ? "shot" : "shots"})`;
  const log=document.getElementById("log");
  log.innerHTML="";
  if(!shots.length){
    const d=document.createElement("div");
    d.className="empty";
    d.innerText="No shots logged yet.";
    log.appendChild(d);
  } else {
    shots.forEach(s=>{
      const d=document.createElement("div");
      d.className="logItem";
      d.innerText=`Shot ${s.shot} • ${s.yards} • ${s.club} • Hole ${s.hole}`;
      log.appendChild(d);
    });
  }
}

function commit(){
  const y=Number(input);
  if(!y) return;

  const pos=nextPosition(y);
  last={ hole:pos.hole, shot:pos.shot, yards:y, club:club(y) };
  shots.unshift(last);

  input="";
  save();
  render();
}

let confirmClearOnUnload = false;

async function clearAndStartOver(){
  const ok = confirm("Start over and clear today's round on this device?");
  if(!ok) return;
  confirmClearOnUnload = true;

  input = "";
  last = null;
  shots = [];
  render();

  try{
    await deleteToday();
  } catch(e){
    console.error(e);
  }

  location.reload();
}

window.addEventListener("beforeunload", (e) => {
  if(!confirmClearOnUnload) return;
  e.preventDefault();
  e.returnValue = "Start over and clear today's round?";
});

document.getElementById("clearLink").onclick=clearAndStartOver;
document.getElementById("ok").onclick=commit;
document.getElementById("pad").onclick=e=>{
  const k=e.target.dataset.k;
  if(!k) return;
  if(k==="C") input="";
  else if(k==="⌫") input=input.slice(0,-1);
  else input+=k;
  render();
  save();
};

async function init(){
  try{
    await openDB();
    const rec=await load();
    if(rec && rec.state){
      input=rec.state.input || "";
      last=rec.state.last || null;
      shots=Array.isArray(rec.state.shots) ? rec.state.shots : [];
    }
  } catch(e){
    console.error(e);
  }
  render();
}

init();
</script>

</body>
</html>
